repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  # Ruff version.
  rev: v0.11.12
  hooks:
    # Run the linter.
    - id: ruff-check
      exclude: ^(01-tutorials|02-use-cases|03-integrations|skills)/
      types_or: [ python, pyi ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      exclude: ^(01-tutorials|02-use-cases|03-integrations|skills)/
      types_or: [ python, pyi ]
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.24.2
  hooks:
    - id: gitleaks
- repo: local
  hooks:
    - id: markdownlint-cli2
      name: markdownlint-cli2
      entry: markdownlint-cli2
      language: node
      additional_dependencies:
        - markdownlint-cli2@0.18.1
      pass_filenames: false
    - id: check-use-cases-project-yaml
      name: check-use-cases-project-yaml
      entry: python
      args:
        - workflow_utils/check_project_yaml.py
      language: python
      additional_dependencies:
        - python-frontmatter
      files: ^python/.*/project\.yaml$
      types_or: [ yaml ]
